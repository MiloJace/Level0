<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Level 0</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family: "Courier New", monospace; }
  #canvas-holder { position:fixed; inset:0; }
  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at center, rgba(40,36,10,0.85) 0%, rgba(5,5,0,0.97) 75%);
    color:#d9c96a; text-align:center; z-index:20; cursor:pointer;
    transition:opacity 0.8s ease;
  }
  #overlay h1 {
    font-size:2.2em; letter-spacing:0.35em; margin:0 0 0.3em 0; font-weight:400;
    text-shadow: 0 0 12px rgba(217,201,106,0.5);
  }
  #overlay p { font-size:0.95em; opacity:0.75; line-height:1.9; max-width:480px; margin:0.4em 0; }
  #overlay .blink { animation: blink 2.4s infinite; }
  @keyframes blink { 0%,45%{opacity:0.75} 47%{opacity:0.15} 49%{opacity:0.75} 90%{opacity:0.75} 92%{opacity:0.2} 94%{opacity:0.75} }
  #hud {
    position:fixed; left:14px; bottom:12px; color:rgba(217,201,106,0.35); font-size:11px;
    letter-spacing:0.15em; z-index:10; pointer-events:none; user-select:none;
  }
  #timeElapsed {
    position:fixed; right:14px; top:12px; color:rgba(217,201,106,0.3); font-size:11px;
    letter-spacing:0.1em; z-index:10; pointer-events:none; user-select:none;
  }
  #fps {
    position:fixed; left:14px; top:12px; color:rgba(217,201,106,0.25); font-size:10px;
    letter-spacing:0.1em; z-index:10; pointer-events:none; user-select:none;
  }
  #vignette {
    position:fixed; inset:0; pointer-events:none; z-index:5;
    box-shadow: inset 0 0 220px 60px rgba(0,0,0,0.75);
  }
  #whisper {
    position:fixed; left:50%; top:38%; transform:translate(-50%,-50%);
    color:rgba(217,201,106,0.55); font-size:13px; letter-spacing:0.25em; z-index:10;
    pointer-events:none; opacity:0; transition:opacity 2.5s ease; user-select:none; text-align:center;
    width:80%;
  }
  #buzz-toggle {
    position:fixed; right:14px; bottom:12px; z-index:10; color:rgba(217,201,106,0.3);
    font-size:11px; letter-spacing:0.1em; user-select:none;
  }
  #signature {
    position:fixed; left:50%; bottom:4px; transform:translateX(-50%);
    color:rgba(217,201,106,0.28); font-size:10px; letter-spacing:0.2em;
    z-index:10; pointer-events:none; user-select:none;
  }

  /* ---- 触屏控制（默认隐藏，JS 检测到触屏设备后显示） ---- */
  #touch-joystick-zone {
    display:none; position:fixed; left:26px; bottom:26px; width:130px; height:130px; z-index:15;
    touch-action:none;
  }
  #touch-joystick-base {
    position:absolute; inset:0; border-radius:50%;
    background:rgba(217,201,106,0.08); border:1px solid rgba(217,201,106,0.25);
  }
  #touch-joystick-knob {
    position:absolute; width:54px; height:54px; left:38px; top:38px; border-radius:50%;
    background:rgba(217,201,106,0.28); border:1px solid rgba(217,201,106,0.45);
    transition:left 0.05s linear, top 0.05s linear;
  }
  #touch-look-zone {
    display:none; position:fixed; right:0; top:0; width:55%; height:100%; z-index:14;
    touch-action:none;
  }
  #touch-hint {
    display:none; position:fixed; left:50%; bottom:170px; transform:translateX(-50%);
    color:rgba(217,201,106,0.4); font-size:11px; letter-spacing:0.1em; z-index:15;
    pointer-events:none; user-select:none; white-space:nowrap;
  }
  #touch-run-toggle {
    display:none; position:fixed; right:26px; bottom:30px; width:64px; height:64px; z-index:16;
    border-radius:50%; background:rgba(217,201,106,0.12); border:1px solid rgba(217,201,106,0.35);
    color:rgba(217,201,106,0.7); font-size:15px; letter-spacing:0.05em;
    align-items:center; justify-content:center; user-select:none; touch-action:manipulation;
  }
  #touch-run-toggle.running {
    background:rgba(217,80,60,0.28); border-color:rgba(217,110,80,0.6); color:#ffdcd0;
  }
  #caught-overlay {
    display:none; position:fixed; inset:0; z-index:30;
    background:radial-gradient(ellipse at center, rgba(90,10,10,0.92) 0%, rgba(10,0,0,0.98) 80%);
    color:#ffdede; text-align:center; flex-direction:column; align-items:center; justify-content:center;
    font-family:"Courier New", monospace; cursor:pointer;
  }
  #caught-overlay h1 { font-size:2.4em; letter-spacing:0.3em; font-weight:400; margin:0 0 0.4em 0; }
  #caught-overlay p { opacity:0.75; margin:0.3em 0; font-size:0.95em; }
  #caught-overlay .tap-hint { margin-top:1.6em; opacity:0.5; font-size:0.85em; }
</style>
</head>
<body>
<div id="canvas-holder"></div>
<div id="vignette"></div>
<div id="hud">WASD / 方向键 移动 &nbsp;·&nbsp; Shift+W 奔跑 &nbsp;·&nbsp; 鼠标 环顾 &nbsp;·&nbsp; ESC 释放光标</div>
<div id="timeElapsed">已徘徊 00:00</div>
<div id="fps"></div>
<div id="debug-graffiti" style="position:fixed; left:14px; top:28px; color:rgba(217,201,106,0.25); font-size:10px; letter-spacing:0.1em; z-index:10; pointer-events:none; user-select:none;"></div>
<div id="whisper"></div>
<div id="buzz-toggle">[M] 静音音效</div>
<div id="signature">by&nbsp;Milo&nbsp;Jace</div>

<div id="touch-joystick-zone">
  <div id="touch-joystick-base"></div>
  <div id="touch-joystick-knob"></div>
</div>
<div id="touch-look-zone"></div>
<div id="touch-hint">左侧摇杆移动 · 右侧拖动环顾 · 右下角切换走/跑</div>
<div id="touch-run-toggle">走</div>

<div id="caught-overlay">
  <h1>找 到 你 了</h1>
  <p id="caught-time"></p>
  <p class="tap-hint">点击重新开始</p>
</div>

<div id="overlay">
  <h1>后&nbsp;室</h1>
  <p>LEVEL&nbsp;0&nbsp;—&nbsp;"无尽的房间"</p>
  <p>发霉的黄色壁纸，潮湿的地毯，<br>荧光灯永不停息地嗡鸣与闪烁。</p>
  <p class="blink">如果你不够小心，就会被"没顶"到这里。<br>而且，你可能不是一个人在这里。</p>
  <p id="overlay-hint" style="margin-top:1.6em; opacity:0.55; font-size:0.85em;">点击开始 · 你将永远走不出去</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  "use strict";

  // ---------- 基础场景 ----------
  const scene = new THREE.Scene();
  const FOG_COLOR = 0x8f7a35; // 发霉的黄色调，取代默认黑色背景
  scene.fog = new THREE.FogExp2(FOG_COLOR, 0.022);
  scene.background = new THREE.Color(FOG_COLOR);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.05, 95);
  camera.position.set(0, 1.65, 0);

  const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:"high-performance" });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.shadowMap.enabled = false;
  document.getElementById('canvas-holder').appendChild(renderer.domElement);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- 程序化贴图：发霉黄壁纸 & 地毯 ----------
  function makeWallpaperTexture() {
    const c = document.createElement('canvas'); c.width = 256; c.height = 256;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#a89344'; ctx.fillRect(0,0,256,256);
    for (let x=0; x<256; x+=16) {
      ctx.fillStyle = (x/16)%2===0 ? 'rgba(150,130,60,0.18)' : 'rgba(90,75,25,0.12)';
      ctx.fillRect(x,0,16,256);
    }
    for (let i=0;i<35;i++){
      const x = Math.random()*256, y = Math.random()*256, r = 6+Math.random()*22;
      const grad = ctx.createRadialGradient(x,y,0,x,y,r);
      const dark = Math.random()>0.5;
      grad.addColorStop(0, dark ? 'rgba(40,35,10,0.35)' : 'rgba(60,55,15,0.25)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    const imgData = ctx.getImageData(0,0,256,256);
    for (let i=0;i<imgData.data.length;i+=4){
      const n = (Math.random()-0.5)*18;
      imgData.data[i]+=n; imgData.data[i+1]+=n*0.9; imgData.data[i+2]+=n*0.5;
    }
    ctx.putImageData(imgData,0,0);
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  function makeCarpetTexture() {
    const c = document.createElement('canvas'); c.width = 256; c.height = 256;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#8a742b'; ctx.fillRect(0,0,256,256);
    const grid = 16;
    for (let y=0;y<256;y+=grid){
      for (let x=0;x<256;x+=grid){
        const shade = 0.75 + Math.random()*0.5;
        ctx.fillStyle = `rgba(${120*shade|0},${100*shade|0},${35*shade|0},1)`;
        ctx.fillRect(x,y,grid-1,grid-1);
      }
    }
    for (let i=0;i<20;i++){
      const x = Math.random()*256, y = Math.random()*256, r = 8+Math.random()*30;
      const grad = ctx.createRadialGradient(x,y,0,x,y,r);
      grad.addColorStop(0,'rgba(30,25,5,0.3)');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(6,6);
    return tex;
  }

  function makeCeilingTexture() {
    const c = document.createElement('canvas'); c.width=128; c.height=128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#cfc79a'; ctx.fillRect(0,0,128,128);
    ctx.strokeStyle = 'rgba(120,110,70,0.6)'; ctx.lineWidth = 2;
    ctx.strokeRect(0,0,128,128);
    for (let i=0;i<15;i++){
      ctx.fillStyle = 'rgba(90,80,40,0.15)';
      ctx.beginPath();
      ctx.arc(Math.random()*128, Math.random()*128, 3+Math.random()*7, 0, Math.PI*2);
      ctx.fill();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    return tex;
  }

  const wallpaperTex = makeWallpaperTexture();
  const carpetTex = makeCarpetTexture();
  const ceilingTex = makeCeilingTexture();

  // 用 MeshLambertMaterial 替代 MeshStandardMaterial：省去逐像素 PBR 计算，帧率更稳
  const wallMat = new THREE.MeshLambertMaterial({ map: wallpaperTex });
  const floorMat = new THREE.MeshLambertMaterial({ map: carpetTex });
  const ceilMat = new THREE.MeshLambertMaterial({ map: ceilingTex });

  // ---------- 迷宫参数 ----------
  const CELL = 4;
  const WALL_H = 3.6;
  const WALL_T = 0.5;
  const RENDER_RADIUS = 13;   // 进一步加大渲染半径，视野更远
  const LIGHT_POOL_SIZE = 8; // 固定数量的真实光源，避免运行时改变光源总数导致着色器重新编译

  function hash2(x, y) {
    let n = Math.sin(x*127.1 + y*311.7) * 43758.5453123;
    return n - Math.floor(n);
  }
  function edgeHash(x1,y1,x2,y2){
    const ax = Math.min(x1,x2), ay = Math.min(y1,y2);
    const bx = Math.max(x1,x2), by = Math.max(y1,y2);
    return hash2(ax*3.13+bx*0.71, ay*3.13+by*0.71 + 91.7);
  }
  const WALL_PROB = 0.34;
  function hasWall(cx, cy, dir) {
    let nx = cx, ny = cy;
    if (dir===0) ny -= 1;
    if (dir===1) nx += 1;
    if (dir===2) ny += 1;
    if (dir===3) nx -= 1;
    return edgeHash(cx,cy,nx,ny) < WALL_PROB;
  }
  const LIGHT_PROB = 0.32;
  function isLightCell(cx,cy){ return hash2(cx*7.7, cy*13.3) < LIGHT_PROB; }
  // 灯光状态分三档：大部分是稳定不闪的（正常工作的荧光灯），只有少数会闪烁或濒死
  function lightState(cx,cy) {
    const h = hash2(cx*5.1, cy*2.2);
    if (h < 0.55) return 'steady';   // 55% 稳定不闪
    if (h < 0.85) return 'flicker';  // 30% 轻微闪烁
    return 'broken';                 // 15% 濒死般的大幅闪烁
  }
  function lightBaseIntensity(cx,cy){ return 1.0 + hash2(cx,cy)*0.4; }
  function lightSeed(cx,cy){ return hash2(cx*3.3, cy*9.9)*1000; }

  // ---------- 共享几何体（避免每格重复创建/销毁，减轻 GC 压力）----------
  const INNER_WALL_LEN = CELL - WALL_T; // 墙体卡在两侧角柱之间，不与角柱重叠
  const wallGeo = new THREE.BoxGeometry(INNER_WALL_LEN, WALL_H, WALL_T);
  const cornerPostGeo = new THREE.BoxGeometry(WALL_T, WALL_H, WALL_T);
  const pillarLightGeo = new THREE.BoxGeometry(0.6, 0.08, 1.2);
  const floorGeo = new THREE.PlaneGeometry(CELL, CELL);
  const ceilGeo = new THREE.PlaneGeometry(CELL, CELL);
  const SHARED_GEOS = new Set([wallGeo, cornerPostGeo, pillarLightGeo, floorGeo, ceilGeo]);
  const SHARED_MATS = new Set([wallMat, floorMat, ceilMat]);

  // ---------- 涂鸦贴图（透明背景 PNG，按原始宽高比铺满整面墙，需与本 html 放在同一文件夹）----------
  // 每张图的原始 宽/高 比例提前量好写死，不用等图片异步加载完才知道尺寸
  // （buildCell 是同步执行的，没法等 Image.onload）。
  const GRAFFITI_FILES = [
    { name: "Are you here.png",   aspect: 1065/619 },
    { name: "Smile.png",          aspect: 514/664  },
    { name: "See You.png",        aspect: 514/664  },
    { name: "God Bless You.png",  aspect: 514/664  },
    { name: "I hate you.png",     aspect: 1416/664 },
    { name: "Where are u.png",    aspect: 1416/664 }
  ];
  const textureLoader = new THREE.TextureLoader();
  const GRAFFITI_MAX_W = INNER_WALL_LEN - 0.15; // 留一点边距，避免正好卡到角柱边缘
  const GRAFFITI_MAX_H = WALL_H - 0.3;          // 上下留一点空隙，不完全顶到地板/天花板

  // 每张图的材质、几何体都只算一次、共享给所有出现的位置——不管这张涂鸦在墙上出现几十次，
  // 都只有一份 geometry/material，不会因为涂鸦数量变多而增加内存或材质切换开销。
  const graffitiAssets = GRAFFITI_FILES.map(({ name, aspect }) => {
    const tex = textureLoader.load(
      name, undefined, undefined,
      () => console.warn('涂鸦贴图加载失败，请确认它与 html 文件放在同一文件夹：', name)
    );
    // "contain" 式等比缩放：在不超出墙面宽/高的前提下尽量铺满
    let w = GRAFFITI_MAX_W, h = w / aspect;
    if (h > GRAFFITI_MAX_H) { h = GRAFFITI_MAX_H; w = h * aspect; }
    const mat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, alphaTest: 0.05, depthWrite: false, side: THREE.FrontSide
    });
    const geo = new THREE.PlaneGeometry(w, h);
    SHARED_GEOS.add(geo);   // 共享几何体，卸载格子时不能被 dispose 掉
    SHARED_MATS.add(mat);   // 共享材质，同理
    return { mat, geo };
  });
  const GRAFFITI_PROB = 0.10;

  function maybeAddGraffiti(group, dir, wx, wz) {
    if (Math.random() > GRAFFITI_PROB) return;
    const asset = graffitiAssets[Math.floor(Math.random()*graffitiAssets.length)];
    const mesh = new THREE.Mesh(asset.geo, asset.mat);
    mesh.userData.isGraffiti = true;
    const yPos = WALL_H / 2; // 垂直居中铺满
    const eps = 0.03; // 贴图相对墙面略微前移，避免与墙体贴图共面闪烁
    if (dir === 0) { // 北墙，朝向室内（+Z）
      mesh.position.set(wx, yPos, wz - CELL/2 + WALL_T/2 + eps);
    } else if (dir === 2) { // 南墙，朝向室内（-Z）
      mesh.rotation.y = Math.PI;
      mesh.position.set(wx, yPos, wz + CELL/2 - WALL_T/2 - eps);
    } else if (dir === 3) { // 西墙，朝向室内（+X）
      mesh.rotation.y = Math.PI/2;
      mesh.position.set(wx - CELL/2 + WALL_T/2 + eps, yPos, wz);
    } else if (dir === 1) { // 东墙，朝向室内（-X）
      mesh.rotation.y = -Math.PI/2;
      mesh.position.set(wx + CELL/2 - WALL_T/2 - eps, yPos, wz);
    }
    group.add(mesh);
  }

  // 渲染优化：把同一个格子里用同一种材质（wallMat）的墙面 + 角柱手动合并成一个 BufferGeometry，
  // 一个格子最多可能有 4 面墙 + 1 根角柱＝5 个独立 mesh，合并后只剩 1 个 draw call。
  // 手写合并（不依赖 BufferGeometryUtils 插件），只需要处理 position / normal / uv 三个属性。
  const _mergeV = new THREE.Vector3();
  const _mergeN = new THREE.Vector3();
  const _mergeNormalMat = new THREE.Matrix3();
  function mergeBoxEntries(entries) {
    const positions = [], normals = [], uvs = [], indices = [];
    let vertexOffset = 0;
    for (const { geometry, matrix } of entries) {
      _mergeNormalMat.getNormalMatrix(matrix);
      const posAttr = geometry.attributes.position;
      const norAttr = geometry.attributes.normal;
      const uvAttr = geometry.attributes.uv;
      const idx = geometry.index;
      for (let i = 0; i < posAttr.count; i++) {
        _mergeV.fromBufferAttribute(posAttr, i).applyMatrix4(matrix);
        positions.push(_mergeV.x, _mergeV.y, _mergeV.z);
        _mergeN.fromBufferAttribute(norAttr, i).applyMatrix3(_mergeNormalMat).normalize();
        normals.push(_mergeN.x, _mergeN.y, _mergeN.z);
        uvs.push(uvAttr.getX(i), uvAttr.getY(i));
      }
      for (let i = 0; i < idx.count; i++) indices.push(idx.getX(i) + vertexOffset);
      vertexOffset += posAttr.count;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
    geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    geo.setIndex(indices);
    return geo;
  }
  function translationMatrix(x,y,z) { return new THREE.Matrix4().makeTranslation(x,y,z); }
  function rotYMatrix(x,y,z,angle) { const m = new THREE.Matrix4().makeRotationY(angle); m.setPosition(x,y,z); return m; }

  // ---------- 分块渲染世界 ----------
  const worldGroup = new THREE.Group();
  scene.add(worldGroup);
  let builtCells = new Map();
  let panels = []; // { mesh, cx, cy } 用于灯板闪烁动画（不含真实光源，开销很低）

  function buildCell(cx, cy) {
    const key = cx+","+cy;
    if (builtCells.has(key)) return;
    const group = new THREE.Group();
    const wx = cx*CELL, wz = cy*CELL;

    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2;
    floor.position.set(wx, 0, wz);
    group.add(floor);

    const ceil = new THREE.Mesh(ceilGeo, ceilMat);
    ceil.rotation.x = Math.PI/2;
    ceil.position.set(wx, WALL_H, wz);
    group.add(ceil);

    const wallEntries = [];
    if (hasWall(cx,cy,0)) {
      wallEntries.push({ geometry: wallGeo, matrix: translationMatrix(wx, WALL_H/2, wz - CELL/2) });
      maybeAddGraffiti(group, 0, wx, wz);
    }
    if (hasWall(cx,cy,3)) {
      wallEntries.push({ geometry: wallGeo, matrix: rotYMatrix(wx - CELL/2, WALL_H/2, wz, Math.PI/2) });
      maybeAddGraffiti(group, 3, wx, wz);
    }
    if (hasWall(cx,cy,1)) {
      wallEntries.push({ geometry: wallGeo, matrix: rotYMatrix(wx + CELL/2, WALL_H/2, wz, Math.PI/2) });
      maybeAddGraffiti(group, 1, wx, wz);
    }
    if (hasWall(cx,cy,2)) {
      wallEntries.push({ geometry: wallGeo, matrix: translationMatrix(wx, WALL_H/2, wz + CELL/2) });
      maybeAddGraffiti(group, 2, wx, wz);
    }

    // 转角柱：只在西北角真的有墙体交汇时才生成（本格的北墙/西墙，或西邻格的北墙、北邻格的西墙），
    // 而不是每个格子都无条件放一根——避免在完全开阔、没有任何墙的地方也长出柱子。
    // 每个角只由这一个格子（西北角所在格）负责建造，四邻格共享同一个角不会重复建。
    const cornerNeeded =
      hasWall(cx, cy, 0) || hasWall(cx, cy, 3) ||
      hasWall(cx-1, cy, 0) || hasWall(cx, cy-1, 3);
    if (cornerNeeded) {
      wallEntries.push({ geometry: cornerPostGeo, matrix: translationMatrix(wx - CELL/2, WALL_H/2, wz - CELL/2) });
    }

    // 合并这个格子里所有共用 wallMat 的墙面 + 角柱，一次性变成一个 mesh / 一次 draw call
    if (wallEntries.length > 0) {
      const mergedWallGeo = mergeBoxEntries(wallEntries);
      const wallsMesh = new THREE.Mesh(mergedWallGeo, wallMat);
      group.add(wallsMesh);
    }

    if (isLightCell(cx,cy)) {
      const lightMat = new THREE.MeshBasicMaterial({ color:0xfff6cf, transparent:true, opacity:0.95 });
      const panel = new THREE.Mesh(pillarLightGeo, lightMat);
      panel.position.set(wx, WALL_H-0.05, wz);
      group.add(panel);
      panels.push({ mesh: panel, cx, cy });
    }

    worldGroup.add(group);
    builtCells.set(key, group);
  }

  function removeCell(cx, cy) {
    const key = cx+","+cy;
    const g = builtCells.get(key);
    if (!g) return;
    worldGroup.remove(g);
    g.traverse(obj=>{
      if (obj.material && obj.material.map === undefined) {} // no-op
      if (obj.geometry && !SHARED_GEOS.has(obj.geometry)) obj.geometry.dispose();
      if (obj.isMesh && obj.material && !SHARED_MATS.has(obj.material)) {
        obj.material.dispose();
      }
    });
    panels = panels.filter(p => p.cx !== cx || p.cy !== cy);
    builtCells.delete(key);
  }

  function updateWorld(px, pz) {
    const ccx = Math.round(px / CELL);
    const ccz = Math.round(pz / CELL);
    const needed = new Set();
    for (let dx=-RENDER_RADIUS; dx<=RENDER_RADIUS; dx++){
      for (let dy=-RENDER_RADIUS; dy<=RENDER_RADIUS; dy++){
        if (dx*dx+dy*dy <= RENDER_RADIUS*RENDER_RADIUS) {
          const cx = ccx+dx, cy = ccz+dy;
          needed.add(cx+","+cy);
          buildCell(cx, cy);
        }
      }
    }
    for (const key of Array.from(builtCells.keys())) {
      if (!needed.has(key)) {
        const [cx,cy] = key.split(",").map(Number);
        removeCell(cx, cy);
      }
    }
    updateLightPool(ccx, ccz);

    // 调试用：统计当前已加载的涂鸦贴图数量，直接在屏幕上验证生成逻辑是否生效
    let graffitiCount = 0;
    worldGroup.traverse(o => { if (o.userData && o.userData.isGraffiti) graffitiCount++; });
    document.getElementById('debug-graffiti').textContent = `涂鸦已加载: ${graffitiCount}`;
  }

  // ---------- 固定数量的真实光源池（性能关键） ----------
  const lightPool = [];
  for (let i=0;i<LIGHT_POOL_SIZE;i++){
    const pl = new THREE.PointLight(0xfff2c0, 0, CELL*3.4, 2);
    scene.add(pl);
    lightPool.push({ light: pl, cx:null, cy:null, active:false });
  }

  function updateLightPool(ccx, ccz) {
    const candidates = [];
    const SEARCH_R = RENDER_RADIUS;
    for (let dx=-SEARCH_R; dx<=SEARCH_R; dx++){
      for (let dy=-SEARCH_R; dy<=SEARCH_R; dy++){
        const cx = ccx+dx, cy = ccz+dy;
        if (isLightCell(cx,cy)) {
          candidates.push({ cx, cy, dist: dx*dx+dy*dy });
        }
      }
    }
    candidates.sort((a,b)=>a.dist-b.dist);
    for (let i=0;i<LIGHT_POOL_SIZE;i++){
      const entry = lightPool[i];
      const c = candidates[i];
      if (c) {
        entry.cx = c.cx; entry.cy = c.cy; entry.active = true;
        entry.light.position.set(c.cx*CELL, WALL_H-0.3, c.cy*CELL);
      } else {
        entry.active = false;
        entry.light.intensity = 0;
      }
    }
  }

  // ---------- 环境光 ----------
  const ambient = new THREE.AmbientLight(0x4a4318, 0.55);
  scene.add(ambient);
  const hemi = new THREE.HemisphereLight(0xd9c96a, 0x1a1508, 0.25);
  scene.add(hemi);

  updateWorld(0,0);

  // ---------- 玩家移动与碰撞 ----------
  const WALK_SPEED = 3.2;
  const RUN_SPEED = 7.6;
  const player = { x:0, z:0, yaw:0, pitch:0, speed:WALK_SPEED, velX:0, velZ:0, bobPhase:0, breathPhase:0 };
  const keys = {};
  let pointerLocked = false;
  let touchActive = false;
  let touchRunMode = false; // 触屏端：走/跑切换（不是按住，是点一下切换状态）
  let lastChunkX = null, lastChunkZ = null;

  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouchDevice) {
    document.getElementById('overlay-hint').textContent = '点击开始 · 左侧摇杆移动，右侧拖动环顾，右下角切换走/跑';
  }

  const overlayEl = document.getElementById('overlay');
  overlayEl.addEventListener('click', () => {
    startAudio(); // 必须在用户手势的同步调用链中创建/恢复 AudioContext
    if (isTouchDevice) {
      // 触屏设备：不依赖指针锁定（大多数移动浏览器不支持/体验差），直接开始游戏
      touchActive = true;
      overlayEl.style.opacity = '0';
      overlayEl.style.pointerEvents = 'none';
      document.getElementById('touch-joystick-zone').style.display = 'block';
      document.getElementById('touch-look-zone').style.display = 'block';
      document.getElementById('touch-hint').style.display = 'block';
      document.getElementById('touch-run-toggle').style.display = 'flex';
      document.getElementById('hud').style.display = 'none';
      startClock();
    } else {
      renderer.domElement.requestPointerLock();
    }
  });

  document.addEventListener('pointerlockchange', () => {
    pointerLocked = document.pointerLockElement === renderer.domElement;
    overlayEl.style.opacity = pointerLocked ? '0' : '1';
    overlayEl.style.pointerEvents = pointerLocked ? 'none' : 'auto';
    if (pointerLocked) {
      startClock();
    } else {
      // 松开指针锁（比如按 ESC）时，清空移动状态，避免速度残留导致脚步声一直播放
      for (const k in keys) keys[k] = false;
      player.velX = 0;
      player.velZ = 0;
      setWalkingAudio(false);
    }
  });

  document.addEventListener('mousemove', (e) => {
    if (!pointerLocked) return;
    player.yaw   -= e.movementX * 0.0022;
    player.pitch -= e.movementY * 0.0022;
    player.pitch = Math.max(-1.3, Math.min(1.3, player.pitch));
  });

  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'KeyM') toggleMute();
  });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });

  // ---------- 触屏控制：左侧虚拟摇杆（移动）+ 右侧拖动（环顾） ----------
  const joystick = { activeId:null, baseX:0, baseY:0, moveX:0, moveY:0 };
  const lookTouch = { activeId:null, lastX:0, lastY:0 };
  const JOY_MAX_R = 46;

  const joyZone = document.getElementById('touch-joystick-zone');
  const runToggleBtn = document.getElementById('touch-run-toggle');
  runToggleBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    touchRunMode = !touchRunMode;
    runToggleBtn.textContent = touchRunMode ? '跑' : '走';
    runToggleBtn.classList.toggle('running', touchRunMode);
  });
  const joyKnob = document.getElementById('touch-joystick-knob');
  const lookZone = document.getElementById('touch-look-zone');

  function updateJoystickFromPoint(clientX, clientY) {
    let dx = clientX - joystick.baseX;
    let dy = clientY - joystick.baseY;
    const dist = Math.hypot(dx,dy);
    if (dist > JOY_MAX_R) { dx = dx/dist*JOY_MAX_R; dy = dy/dist*JOY_MAX_R; }
    joyKnob.style.left = (38+dx) + 'px';
    joyKnob.style.top  = (38+dy) + 'px';
    joystick.moveX = dx / JOY_MAX_R;      // 左右（strafe）
    joystick.moveY = -dy / JOY_MAX_R;     // 前后（前推为正）
  }
  function resetJoystick() {
    joystick.activeId = null; joystick.moveX = 0; joystick.moveY = 0;
    joyKnob.style.left = '38px'; joyKnob.style.top = '38px';
  }
  function updateLookFromDelta(clientX, clientY) {
    const dx = clientX - lookTouch.lastX, dy = clientY - lookTouch.lastY;
    lookTouch.lastX = clientX; lookTouch.lastY = clientY;
    player.yaw   -= dx * 0.0035;
    player.pitch -= dy * 0.0035;
    player.pitch = Math.max(-1.3, Math.min(1.3, player.pitch));
  }

  // 优先用 Pointer Events + setPointerCapture：手指按下后即使滑出摇杆的可视范围，
  // 移动/抬起事件依然会稳定地发给这个元素，不会因为滑出边界而"丢手"卡住。
  // 但少数移动端浏览器对 Pointer Events 支持不完整，所以同时保留原始 touch 事件作为后备，
  // 两套方案二选一使用（不会同时生效，避免同一次触摸被处理两遍）。
  if (window.PointerEvent) {
    joyZone.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      joyZone.setPointerCapture(e.pointerId);
      joystick.activeId = e.pointerId;
      const rect = joyZone.getBoundingClientRect();
      joystick.baseX = rect.left + rect.width/2;
      joystick.baseY = rect.top + rect.height/2;
      updateJoystickFromPoint(e.clientX, e.clientY);
    });
    joyZone.addEventListener('pointermove', (e) => {
      if (e.pointerId !== joystick.activeId) return;
      e.preventDefault();
      updateJoystickFromPoint(e.clientX, e.clientY);
    });
    const endJoystickPointer = (e) => { if (e.pointerId === joystick.activeId) resetJoystick(); };
    joyZone.addEventListener('pointerup', endJoystickPointer);
    joyZone.addEventListener('pointercancel', endJoystickPointer);

    lookZone.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      lookZone.setPointerCapture(e.pointerId);
      lookTouch.activeId = e.pointerId;
      lookTouch.lastX = e.clientX; lookTouch.lastY = e.clientY;
    });
    lookZone.addEventListener('pointermove', (e) => {
      if (e.pointerId !== lookTouch.activeId) return;
      e.preventDefault();
      updateLookFromDelta(e.clientX, e.clientY);
    });
    const endLookPointer = (e) => { if (e.pointerId === lookTouch.activeId) lookTouch.activeId = null; };
    lookZone.addEventListener('pointerup', endLookPointer);
    lookZone.addEventListener('pointercancel', endLookPointer);
  } else {
    // 兜底：原始 touch 事件（identifier 追踪），用于不支持 Pointer Events 的浏览器
    joyZone.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      joystick.activeId = t.identifier;
      const rect = joyZone.getBoundingClientRect();
      joystick.baseX = rect.left + rect.width/2;
      joystick.baseY = rect.top + rect.height/2;
      updateJoystickFromPoint(t.clientX, t.clientY);
    }, { passive:false });
    lookZone.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      lookTouch.activeId = t.identifier;
      lookTouch.lastX = t.clientX; lookTouch.lastY = t.clientY;
    }, { passive:false });
    document.addEventListener('touchmove', (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === joystick.activeId) { e.preventDefault(); updateJoystickFromPoint(t.clientX, t.clientY); }
        if (t.identifier === lookTouch.activeId) { e.preventDefault(); updateLookFromDelta(t.clientX, t.clientY); }
      }
    }, { passive:false });
    document.addEventListener('touchend', (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === joystick.activeId) resetJoystick();
        if (t.identifier === lookTouch.activeId) lookTouch.activeId = null;
      }
    });
    document.addEventListener('touchcancel', (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier === joystick.activeId) resetJoystick();
        if (t.identifier === lookTouch.activeId) lookTouch.activeId = null;
      }
    });
  }

  function wallBlocksAt(x, z) {
    const cx = Math.round(x/CELL), cz = Math.round(z/CELL);
    for (let dx=-1; dx<=1; dx++){
      for (let dz=-1; dz<=1; dz++){
        const gx = cx+dx, gz = cz+dz;
        const wx = gx*CELL, wz = gz*CELL;
        const checks = [];
        if (hasWall(gx,gz,0)) checks.push({x:wx, z:wz-CELL/2, w:INNER_WALL_LEN, d:WALL_T});
        if (hasWall(gx,gz,2)) checks.push({x:wx, z:wz+CELL/2, w:INNER_WALL_LEN, d:WALL_T});
        if (hasWall(gx,gz,3)) checks.push({x:wx-CELL/2, z:wz, w:WALL_T, d:INNER_WALL_LEN});
        if (hasWall(gx,gz,1)) checks.push({x:wx+CELL/2, z:wz, w:WALL_T, d:INNER_WALL_LEN});
        // 转角柱的碰撞（只在西北角真的有墙体交汇时才存在，需与建造逻辑保持一致）
        const cornerNeeded =
          hasWall(gx, gz, 0) || hasWall(gx, gz, 3) ||
          hasWall(gx-1, gz, 0) || hasWall(gx, gz-1, 3);
        if (cornerNeeded) checks.push({x:wx-CELL/2, z:wz-CELL/2, w:WALL_T, d:WALL_T});
        for (const c of checks) {
          if (Math.abs(x-c.x) < c.w/2 + 0.28 && Math.abs(z-c.z) < c.d/2 + 0.28) return true;
        }
      }
    }
    return false;
  }

  // ---------- 追逐怪物：2D 贴图（billboard），高度与房间等高，会一路寻着玩家追过来 ----------
  const monsterTex = new THREE.TextureLoader().load(
    'monster.png', undefined, undefined,
    () => console.warn('怪物贴图加载失败，请确认 monster.png 与 html 文件放在同一文件夹')
  );
  const MONSTER_HEIGHT = WALL_H;              // 高度与房间一样高
  const MONSTER_WIDTH  = MONSTER_HEIGHT;      // 贴图接近正方形，宽度与高度同比例
  const MONSTER_SPEED  = 5.8;                 // 再提速，比奔跑略慢，仍逼玩家必须冲刺甩开
  const CATCH_DIST     = 1.1;
  const MONSTER_SPAWN_DIST = 20;              // 与玩家出生点的初始距离（格数）
  const NUM_MONSTERS   = 3;                   // 同时追逐玩家的怪物数量

  // 材质/几何体只做一份，所有怪物共享（各自是独立的 Mesh 实例，只是复用同一份贴图资源）
  const monsterMat = new THREE.MeshBasicMaterial({
    map: monsterTex, transparent: true, alphaTest: 0.05, side: THREE.DoubleSide
  });
  const monsterGeo = new THREE.PlaneGeometry(MONSTER_WIDTH, MONSTER_HEIGHT);

  const monsters = [];
  for (let i = 0; i < NUM_MONSTERS; i++) {
    const mesh = new THREE.Mesh(monsterGeo, monsterMat);
    scene.add(mesh);
    monsters.push({
      mesh, x:0, z:0, active:false,
      path: null, pathIndex: 0,             // BFS 寻路得到的格子路径（世界坐标 waypoint 数组）
      lastGoalCx: null, lastGoalCz: null,   // 上次算路时玩家所在的格子，用来判断要不要重新算
      repathCooldown: Math.random()*0.3,    // 各自错开重算时机，避免同一帧集体跑 BFS
      wanderAngle:0, wanderTimer:0,         // BFS 找不到路时的兜底：随机游走
      stuckTimer: Math.random()*1.2, lastCheckDist: Infinity
    });
  }

  // 把一个世界坐标"吸附"到最近的格子中心——格子中心保证永远是空地，不会落在墙/角柱里
  function snapToCellCenter(x, z) {
    return { x: Math.round(x/CELL)*CELL, z: Math.round(z/CELL)*CELL };
  }

  function spawnMonster(px, pz) {
    for (const m of monsters) {
      const angle = Math.random() * Math.PI * 2;
      const raw = { x: px + Math.sin(angle)*MONSTER_SPAWN_DIST*CELL, z: pz + Math.cos(angle)*MONSTER_SPAWN_DIST*CELL };
      const snapped = snapToCellCenter(raw.x, raw.z);
      m.x = snapped.x;
      m.z = snapped.z;
      m.active = true;
      m.path = null;
      m.pathIndex = 0;
      m.lastGoalCx = null;
      m.lastGoalCz = null;
      m.repathCooldown = Math.random()*0.3;
      m.wanderTimer = 0;
      m.stuckTimer = Math.random()*1.2;
      m.lastCheckDist = Infinity;
    }
  }

  let caught = false;
  function triggerCaught() {
    if (caught) return;
    caught = true;
    if (document.pointerLockElement) document.exitPointerLock();
    setWalkingAudio(false);
    const s = startTime ? Math.floor((performance.now()-startTime)/1000) : 0;
    const mm = String(Math.floor(s/60)).padStart(2,'0');
    const ss = String(s%60).padStart(2,'0');
    document.getElementById('caught-time').textContent = `你在后室里徘徊了 ${mm}:${ss}`;
    const co = document.getElementById('caught-overlay');
    co.style.display = 'flex';
    co.addEventListener('click', () => location.reload(), { once:true });
  }

  // ---------- BFS 网格寻路：沿着迷宫真实连通的格子走，而不是"感觉哪边空就往哪挪"----------
  // hasWall(cx,cy,dir) 本身就是判断两个相邻格子之间通不通的依据，直接拿来当图的边。
  const PATHFIND_MAX_NODES = 2200; // 搜索节点上限，超出范围就放弃（极端距离下退化成兜底探须走位）
  function findPath(startCx, startCz, goalCx, goalCz) {
    if (startCx === goalCx && startCz === goalCz) return [];
    const startKey = startCx+','+startCz;
    const visited = new Set([startKey]);
    const cameFrom = new Map();
    const queue = [[startCx, startCz]];
    let head = 0, explored = 0;
    while (head < queue.length && explored < PATHFIND_MAX_NODES) {
      const [cx, cz] = queue[head++];
      explored++;
      if (cx === goalCx && cz === goalCz) {
        const path = [];
        let curKey = cx+','+cz;
        let cur = [cx, cz];
        while (curKey !== startKey) {
          path.push(cur);
          cur = cameFrom.get(curKey);
          curKey = cur[0]+','+cur[1];
        }
        path.reverse();
        return path;
      }
      const neighbors = [[cx,cz-1,0],[cx+1,cz,1],[cx,cz+1,2],[cx-1,cz,3]];
      for (const [nx, nz, dir] of neighbors) {
        if (hasWall(cx, cz, dir)) continue; // 这个方向被墙挡住，图里没有这条边
        const key = nx+','+nz;
        if (visited.has(key)) continue;
        visited.add(key);
        cameFrom.set(key, [cx, cz]);
        queue.push([nx, nz]);
      }
    }
    return null; // 搜索范围内没找到（距离太远，或者极端情况下暂时不连通）
  }

  // 探须式避障：只在 BFS 失败时兜底用（正常情况下不会走到这一步），
  // 逻辑不变——目标方向左右扇形展开，挑第一个走得通的方向前进。
  const WHISKER_OFFSETS_DEG = [0, 20, -20, 40, -40,65, -65, 90, -90, 120, -120, 150, -150, 180];
  function tryMoveMonsterTowardAngle(m, desiredAngle, stepDist) {
    for (const offsetDeg of WHISKER_OFFSETS_DEG) {
      const angle = desiredAngle + offsetDeg * Math.PI / 180;
      const nx = m.x + Math.sin(angle) * stepDist;
      const nz = m.z + Math.cos(angle) * stepDist;
      if (!wallBlocksAt(nx, nz)) {
        m.x = nx;
        m.z = nz;
        return true;
      }
    }
    return false;
  }

  function updateMonster(m, dt, playerX, playerZ) {
    if (!m.active || caught) return;
    const dx0 = playerX - m.x, dz0 = playerZ - m.z;
    const dist = Math.hypot(dx0, dz0);

    // 玩家所在格子变了、或者当前没有路径了，就重新跑一次 BFS（有冷却，避免每帧都算）
    const goalCx = Math.round(playerX / CELL), goalCz = Math.round(playerZ / CELL);
    m.repathCooldown -= dt;
    const needRepath = (m.path === null) || (goalCx !== m.lastGoalCx || goalCz !== m.lastGoalCz);
    if (needRepath && m.repathCooldown <= 0) {
      const startCx = Math.round(m.x / CELL), startCz = Math.round(m.z / CELL);
      m.path = findPath(startCx, startCz, goalCx, goalCz);
      m.pathIndex = 0;
      m.lastGoalCx = goalCx;
      m.lastGoalCz = goalCz;
      m.repathCooldown = 0.35 + Math.random()*0.15; // 冷却，防止同一只怪每帧都重算
    }

    // 卡住检测：BFS 路径理论上不会真的卡死，但保留这层兜底，
    // 万一走位在两个 waypoint 之间反复横跳也能靠随机游走摆脱。
    m.stuckTimer += dt;
    if (m.stuckTimer > 1.2) {
      if (dist > m.lastCheckDist - 0.4) {
        m.wanderTimer = 1.2 + Math.random() * 0.8;
        m.wanderAngle = Math.random() * Math.PI * 2;
      }
      m.lastCheckDist = dist;
      m.stuckTimer = 0;
    }

    const stepDist = MONSTER_SPEED * dt;
    if (m.wanderTimer > 0) {
      // 卡住兜底：先不管路径，随机方向硬闯一小段
      m.wanderTimer -= dt;
      tryMoveMonsterTowardAngle(m, m.wanderAngle, stepDist);
    } else if (m.path && m.path.length > 0) {
      // 正常状态：沿着 BFS 算出来的格子路径，一格一格朝下一个 waypoint 走
      if (m.pathIndex >= m.path.length) {
        // 路径已经走完，说明已经在玩家所在格子附近，直接冲向玩家做最后收尾
        if (dist > 0.001) tryMoveMonsterTowardAngle(m, Math.atan2(dx0, dz0), stepDist);
      } else {
        const [wcx, wcz] = m.path[m.pathIndex];
        const wx = wcx*CELL, wz = wcz*CELL;
        const wdx = wx - m.x, wdz = wz - m.z;
        const wdist = Math.hypot(wdx, wdz);
        if (wdist < 0.35) {
          m.pathIndex++; // 到达这个 waypoint，换下一个
        } else {
          const angle = Math.atan2(wdx, wdz);
          tryMoveMonsterTowardAngle(m, angle, stepDist);
        }
      }
    } else if (dist > 0.001) {
      // BFS 没找到路（极端情况）：退回直奔玩家的探须走位兜底
      tryMoveMonsterTowardAngle(m, Math.atan2(dx0, dz0), stepDist);
    }

    m.mesh.position.set(m.x, MONSTER_HEIGHT/2, m.z);
    // 只做水平方向的 billboard（贴图始终立着面朝玩家，不会因为抬头低头而跟着诡异倾斜）
    const bx = camera.position.x - m.x, bz = camera.position.z - m.z;
    m.mesh.rotation.y = Math.atan2(bx, bz);
    if (dist < CATCH_DIST) triggerCaught();
  }
  function updateAllMonsters(dt, playerX, playerZ) {
    for (const m of monsters) updateMonster(m, dt, playerX, playerZ);
  }


  // ---------- 音频：真实录音文件（优先 Web Audio 统一混音，失败则自动回退到普通 <audio> 播放） ----------
  // 之所以优先用 Web Audio：不少手机浏览器（尤其 iOS Safari）对"同一次用户手势里同时播放多个
  // <audio> 元素"限制很严，容易出现只有第一个能起播、后面被打断且不会自动恢复的问题；
  // 但 Web Audio 需要用 fetch() 读取文件字节再解码，如果这个 html 是直接用 file:// 双击打开的
  // （而不是通过 http://localhost 之类的本地服务器访问），fetch() 在很多浏览器里会直接失败，
  // 导致什么声音都出不来。所以这里做了自动兜底：Web Audio 加载失败就自动切换回普通 <audio> 标签
  // 播放（兼容性最好，但手机上偶尔仍可能出现多个音轨互相打断的老问题）。
  let audioCtx = null;
  let humGain, breathGain, footstepGain;
  let humBuffer = null, breathBuffer = null, footstepBuffer = null;
  let footstepSource = null, footstepStartTime = 0;
  let muted = false, audioStarted = false, wasWalking = false;
  let usingFallbackAudio = false;
  let fbHum = null, fbBreath = null, fbFootstep = null;

  async function loadAudioBuffer(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const arrBuf = await resp.arrayBuffer();
    return await audioCtx.decodeAudioData(arrBuf);
  }

  function playLoop(buffer, gainNode) {
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.loop = true;
    src.connect(gainNode);
    src.start(0);
    return src;
  }

  function startFallbackAudio() {
    usingFallbackAudio = true;
    fbHum = new Audio('嗡鸣声.aac');      fbHum.loop = true;      fbHum.volume = muted ? 0 : 0.75;
    fbBreath = new Audio('呼吸.aac');     fbBreath.loop = true;   fbBreath.volume = muted ? 0 : 0.32;
    fbFootstep = new Audio('脚步声.aac'); fbFootstep.loop = true; fbFootstep.volume = muted ? 0 : 0.28;
    fbHum.play().catch(e => console.warn('嗡鸣声播放失败（兼容模式）', e));
    fbBreath.play().catch(e => console.warn('呼吸声播放失败（兼容模式）', e));
  }

  function startAudio() {
    if (audioStarted) {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      return;
    }
    audioStarted = true;
    try {
      // AudioContext 必须在用户手势的同步调用链里创建/恢复，否则会被浏览器自动播放策略拦截
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      humGain = audioCtx.createGain();      humGain.gain.value = muted ? 0 : 0.75;
      breathGain = audioCtx.createGain();   breathGain.gain.value = muted ? 0 : 0.32;
      footstepGain = audioCtx.createGain(); footstepGain.gain.value = muted ? 0 : 0.28;
      humGain.connect(audioCtx.destination);
      breathGain.connect(audioCtx.destination);
      footstepGain.connect(audioCtx.destination);
      if (audioCtx.state === 'suspended') audioCtx.resume();

      Promise.all([
        loadAudioBuffer('嗡鸣声.aac'),
        loadAudioBuffer('呼吸.aac'),
        loadAudioBuffer('脚步声.aac')
      ]).then(([hum, breath, foot]) => {
        humBuffer = hum; breathBuffer = breath; footstepBuffer = foot;
        playLoop(humBuffer, humGain);
        playLoop(breathBuffer, breathGain);
      }).catch(err => {
        console.warn('Web Audio 加载失败（很可能是用 file:// 直接打开、fetch 被拦截），自动切换到兼容模式：', err);
        startFallbackAudio();
      });
    } catch (e) {
      console.warn('Web Audio 初始化失败，自动切换到兼容模式：', e);
      startFallbackAudio();
    }
  }

  function toggleMute() {
    muted = !muted;
    if (usingFallbackAudio) {
      if (fbHum) fbHum.muted = muted;
      if (fbBreath) fbBreath.muted = muted;
      if (fbFootstep) fbFootstep.muted = muted;
    } else {
      if (humGain) humGain.gain.value = muted ? 0 : 0.75;
      if (breathGain) breathGain.gain.value = muted ? 0 : 0.32;
      if (footstepGain) footstepGain.gain.value = muted ? 0 : 0.28;
    }
    document.getElementById('buzz-toggle').textContent = muted ? '[M] 取消静音' : '[M] 静音音效';
  }

  let footstepRate = 1.0;
  function setWalkingAudio(isWalking, isRunningNow) {
    if (isWalking === wasWalking) {
      // 已经在走/跑，但可能中途在走和跑之间切换了——同步一下播放速率
      updateFootstepRate(isRunningNow);
      return;
    }
    wasWalking = isWalking;
    const rate = isRunningNow ? 1.55 : 1.0;
    footstepRate = rate;
    if (usingFallbackAudio) {
      if (isWalking) {
        if (fbFootstep) {
          fbFootstep.playbackRate = rate;
          fbFootstep.currentTime = 0;
          fbFootstep.play().catch(e => console.warn('脚步声播放失败（兼容模式）', e));
        }
      } else if (fbFootstep) {
        fbFootstep.pause();
      }
      return;
    }
    if (isWalking) {
      if (!footstepBuffer || !audioCtx) return; // 还没加载完成就先不管，下次移动再触发
      if (footstepSource) { try { footstepSource.stop(); } catch(e) {} }
      footstepSource = playLoop(footstepBuffer, footstepGain);
      footstepSource.playbackRate.value = rate;
      footstepStartTime = audioCtx.currentTime;
    } else if (footstepSource) {
      try { footstepSource.stop(); } catch(e) {}
      footstepSource = null;
    }
  }
  function updateFootstepRate(isRunningNow) {
    const rate = isRunningNow ? 1.55 : 1.0;
    if (rate === footstepRate) return;
    if (!usingFallbackAudio && footstepSource && audioCtx && footstepBuffer) {
      // 变速时重新校准起播时间戳，避免视角晃动的相位突然跳一下
      const oldElapsed = audioCtx.currentTime - footstepStartTime;
      const oldPhasePos = (oldElapsed * footstepRate) % footstepBuffer.duration;
      footstepStartTime = audioCtx.currentTime - oldPhasePos / rate;
      footstepSource.playbackRate.value = rate;
    }
    footstepRate = rate;
    if (usingFallbackAudio && fbFootstep) fbFootstep.playbackRate = rate;
  }

  // 模拟出一个和 HTMLMediaElement.currentTime 等价的量，供视角晃动读取脚步声播放进度
  function getFootstepTime() {
    if (usingFallbackAudio) return fbFootstep ? fbFootstep.currentTime : 0;
    if (!footstepSource || !footstepBuffer || !audioCtx) return 0;
    const elapsed = audioCtx.currentTime - footstepStartTime;
    return (elapsed * footstepRate) % footstepBuffer.duration;
  }

  // ---------- 计时 & 低语文字 ----------
  let startTime = null, clockStarted = false;
  function startClock() {
    if (clockStarted) return;
    clockStarted = true;
    startTime = performance.now();
    spawnMonster(player.x, player.z);
  }
  function updateClock() {
    if (!startTime) return;
    const s = Math.floor((performance.now()-startTime)/1000);
    const mm = String(Math.floor(s/60)).padStart(2,'0');
    const ss = String(s%60).padStart(2,'0');
    document.getElementById('timeElapsed').textContent = `已徘徊 ${mm}:${ss}`;
  }

  const whispers = [
    "……这里没有出口……",
    "墙纸的味道，你还记得吗",
    "灯光又暗了一下",
    "你走过这里了",
    "地毯是湿的",
    "继续走，没有别的办法",
    "嗡…………嗡…………",
    "没有人会来找你"
  ];
  let lastWhisperTime = 0;
  function maybeWhisper(t) {
    if (t - lastWhisperTime > 14 + Math.random()*20) {
      lastWhisperTime = t;
      const el = document.getElementById('whisper');
      el.textContent = whispers[Math.floor(Math.random()*whispers.length)];
      el.style.opacity = 0.6;
      setTimeout(()=>{ el.style.opacity = 0; }, 4200);
    }
  }

  // ---------- 主循环 ----------
  let lastT = performance.now();
  let fpsAccum = 0, fpsCount = 0, fpsTimer = 0;
  function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = Math.min(0.05, (now-lastT)/1000);
    lastT = now;

    let isRunning = false;
    if ((pointerLocked || touchActive) && !caught) {
      let fwd = 0, strafe = 0;
      if (keys['KeyW']||keys['ArrowUp'])    fwd += 1;
      if (keys['KeyS']||keys['ArrowDown'])  fwd -= 1;
      if (keys['KeyD']||keys['ArrowRight']) strafe += 1;
      if (keys['KeyA']||keys['ArrowLeft'])  strafe -= 1;
      // 叠加触屏摇杆输入（摇杆本身已经是 -1..1 的连续值，不需要额外归一化处理）
      fwd += joystick.moveY;
      strafe += joystick.moveX;
      const inputLen = Math.hypot(fwd, strafe);
      const hasInput = inputLen > 0.05;
      if (hasInput && inputLen > 1) { fwd /= inputLen; strafe /= inputLen; }

      // 奔跑判定：键鼠端要按住 shift 且同时按着 W／↑ 才算奔跑；触屏端是单击切换的开关
      const keyboardSprint = (keys['ShiftLeft']||keys['ShiftRight']) && (keys['KeyW']||keys['ArrowUp']);
      isRunning = pointerLocked ? keyboardSprint : touchRunMode;
      player.speed = isRunning ? RUN_SPEED : WALK_SPEED;

      const yaw = player.yaw;
      const forwardX = -Math.sin(yaw), forwardZ = -Math.cos(yaw);
      const rightX = Math.cos(yaw), rightZ = -Math.sin(yaw);
      const targetVX = (forwardX*fwd + rightX*strafe) * player.speed;
      const targetVZ = (forwardZ*fwd + rightZ*strafe) * player.speed;

      // 平滑加速/减速：有输入时较快趋近目标速度，松手后缓慢衰减到 0，而不是瞬间停下
      const smoothRate = hasInput ? 7.5 : 4.5;
      const blend = 1 - Math.exp(-smoothRate * dt);
      player.velX += (targetVX - player.velX) * blend;
      player.velZ += (targetVZ - player.velZ) * blend;
      if (Math.hypot(player.velX, player.velZ) < 0.002) { player.velX = 0; player.velZ = 0; }

      const nx = player.x + player.velX * dt;
      const nz = player.z + player.velZ * dt;
      let blockedX = wallBlocksAt(nx, player.z);
      let blockedZ = wallBlocksAt(player.x, nz);
      if (!blockedX) player.x = nx; else player.velX = 0;
      if (!blockedZ) player.z = nz; else player.velZ = 0;

      const ccx = Math.round(player.x / CELL), ccz = Math.round(player.z / CELL);
      if (ccx !== lastChunkX || ccz !== lastChunkZ) {
        lastChunkX = ccx; lastChunkZ = ccz;
        updateWorld(player.x, player.z);
      }
      updateClock();
      maybeWhisper(now/1000);
      updateAllMonsters(dt, player.x, player.z);
    }

    // ---- 视角晃动：走路时的步伐起伏跟随脚步声音频播放进度，静止时是呼吸起伏 ----
    const horizSpeed = Math.hypot(player.velX, player.velZ);
    const moveFactor = Math.min(1, horizSpeed / player.speed); // 0=静止, 1=全速，平滑过渡
    setWalkingAudio(horizSpeed > 0.25, isRunning);
    player.breathPhase += dt; // 呼吸晃动始终随时间推进

    // 脚步声.aac 是 3 秒钟 10 次脚步，即每次落脚间隔 0.3 秒 => 每秒 10/3 次
    // 注意：下面用 abs(sin) 来做"落脚下沉"，而 abs(sin) 本身周期是 π 不是 2π（频率天然翻倍），
    // 所以这里只乘 Math.PI（不是 2π），下沉频率才会与脚步声真实频率一致，不会变成两倍速。
    const STEP_FREQ = 10 / 3;
    const audioPhase = getFootstepTime() * STEP_FREQ * Math.PI;
    const walkBobY   = -Math.abs(Math.sin(audioPhase)) * 0.05 * moveFactor;
    const walkSwayX  = Math.sin(audioPhase) * 0.022 * moveFactor;   // 左右脚交替的侧向摆动（每两步一个完整周期）
    const walkRoll   = Math.sin(audioPhase) * 0.010 * moveFactor;
    const breathBobY = Math.sin(player.breathPhase * 0.9) * 0.016 * (1 - moveFactor);
    const breathRoll = Math.sin(player.breathPhase * 0.55) * 0.004 * (1 - moveFactor);

    const camYaw = player.yaw;
    const camRightX = Math.cos(camYaw), camRightZ = -Math.sin(camYaw);

    camera.position.set(
      player.x + camRightX * walkSwayX,
      1.65 + walkBobY + breathBobY,
      player.z + camRightZ * walkSwayX
    );
    camera.rotation.order = 'YXZ';
    camera.rotation.y = player.yaw;
    camera.rotation.x = player.pitch;
    camera.rotation.z = walkRoll + breathRoll;

    // 灯板视觉闪烁（不含真实光照运算，开销很低）
    for (const p of panels) {
      const t = now*0.001 + lightSeed(p.cx,p.cy);
      const state = lightState(p.cx,p.cy);
      let flicker;
      if (state === 'steady') {
        flicker = 1.0; // 稳定不闪
      } else if (state === 'broken') {
        flicker = (Math.sin(t*37.0) > 0.9) ? 1.0 : 0.12 + 0.05*Math.sin(t*5.0);
      } else {
        const jitter = 0.9 + 0.1*Math.sin(t*23.0) + 0.05*Math.sin(t*71.0);
        const rareDip = (Math.sin(t*1.7 + lightSeed(p.cx,p.cy)) < -0.965) ? 0.25 : 1.0;
        flicker = jitter * rareDip;
      }
      p.mesh.material.opacity = 0.5 + 0.5*flicker;
    }

    // 真实光源池闪烁（固定数量，光源总数不变，避免着色器重编译）
    for (const entry of lightPool) {
      if (!entry.active) continue;
      const t = now*0.001 + lightSeed(entry.cx, entry.cy);
      const state = lightState(entry.cx, entry.cy);
      let flicker;
      if (state === 'steady') {
        flicker = 1.0;
      } else if (state === 'broken') {
        flicker = (Math.sin(t*37.0) > 0.9) ? 1.0 : 0.12 + 0.05*Math.sin(t*5.0);
      } else {
        const jitter = 0.9 + 0.1*Math.sin(t*23.0) + 0.05*Math.sin(t*71.0);
        const rareDip = (Math.sin(t*1.7 + lightSeed(entry.cx,entry.cy)) < -0.965) ? 0.25 : 1.0;
        flicker = jitter * rareDip;
      }
      entry.light.intensity = lightBaseIntensity(entry.cx, entry.cy) * flicker;
    }

    // 简易 FPS 显示
    fpsCount++; fpsTimer += dt;
    if (fpsTimer >= 0.5) {
      document.getElementById('fps').textContent = Math.round(fpsCount/fpsTimer) + ' fps';
      fpsCount = 0; fpsTimer = 0;
    }

    renderer.render(scene, camera);
  }
  animate();

})();
</script>
</body>
</html>
